services:
  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: ripple
      POSTGRES_PASSWORD: ripple
      POSTGRES_DB: ripple
    ports:
      - "55432:5432"
    volumes:
      - ripple_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ripple -d ripple"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  ripple_pgdata:
