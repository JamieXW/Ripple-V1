services:
  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: ripple
      POSTGRES_PASSWORD: ripple
      POSTGRES_DB: ripple
    ports:
      - "55432:5432"
    volumes:
      - ripple_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ripple -d ripple"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "56379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Full containerized stack: docker compose --profile app up --build
  # (plain `docker compose up` still starts only db+redis for local dev)
  app:
    profiles: ["app"]
    build: .
    ports:
      - "58000:8000"
    environment:
      RIPPLE_DATABASE_URL: postgresql+psycopg://ripple:ripple@db:5432/ripple
      RIPPLE_REDIS_URL: redis://redis:6379/0
      RIPPLE_RERANKER_MODEL: ${RIPPLE_RERANKER_MODEL:-/app/models/reranker}
    volumes:
      - ./models:/app/models:ro  # fine-tuned reranker (gitignored weights)
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  ripple_pgdata:
