name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: ripple
          POSTGRES_PASSWORD: ripple
          POSTGRES_DB: ripple
        ports:
          - "55432:5432"
        options: >-
          --health-cmd "pg_isready -U ripple -d ripple"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python + dependencies
        run: |
          uv python install 3.12
          uv sync --extra dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (black)
        run: uv run black --check .

      - name: Type check (mypy, strict)
        run: uv run mypy

      - name: Tests (pytest, incl. Postgres/pgvector round-trips)
        run: uv run pytest -q
        env:
          RIPPLE_DATABASE_URL: postgresql+psycopg://ripple:ripple@localhost:55432/ripple
